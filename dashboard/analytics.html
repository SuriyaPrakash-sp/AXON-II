<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FloodWatch — Analytics</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- Navigation -->
<nav class="nav">
  <div class="nav-brand">
    <div class="brand-icon">🌊</div>
    FloodWatch
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html" data-page="index.html">Home</a>
    <a class="nav-link" href="dashboard.html" data-page="dashboard.html">Dashboard</a>
    <a class="nav-link active" href="analytics.html" data-page="analytics.html">Analytics</a>
  </div>
  <div class="nav-status">
    <div id="status-dot" class="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Analytics</div>
      <div class="page-subtitle">Trends, risk distribution, and node history</div>
    </div>
    <div class="timestamp" id="last-updated">—</div>
  </div>

  <!-- Node selector -->
  <div style="margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--text-secondary)">Node:</span>
    <div id="node-selector" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>

  <!-- Trend charts row -->
  <div class="charts-grid" style="margin-bottom:20px">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">RAINFALL TREND</span></div>
      <div class="panel-body">
        <div class="chart-wrap"><canvas id="chart-rainfall" role="img" aria-label="Rainfall trend over time"></canvas></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">WATER LEVEL TREND</span></div>
      <div class="panel-body">
        <div class="chart-wrap"><canvas id="chart-water" role="img" aria-label="Water level trend over time"></canvas></div>
      </div>
    </div>
  </div>

  <!-- Risk distribution over time -->
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-header"><span class="panel-title">RISK DISTRIBUTION OVER TIME</span></div>
    <div class="panel-body">
      <div class="chart-wrap" style="height:200px">
        <canvas id="chart-risk" role="img" aria-label="Risk distribution stacked bar chart over time"></canvas>
      </div>
    </div>
  </div>

  <!-- Per-node risk matrix -->
  <div class="panel">
    <div class="panel-header"><span class="panel-title">NODE RISK MATRIX (LATEST)</span></div>
    <div class="panel-body" style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px" id="risk-table">
        <thead>
          <tr>
            <th style="text-align:left;padding:6px 12px;color:var(--text-secondary);font-weight:500;border-bottom:1px solid var(--border)">Node</th>
            <th style="padding:6px 12px;color:var(--text-secondary);font-weight:500;border-bottom:1px solid var(--border)">Status</th>
            <th style="padding:6px 12px;color:var(--text-secondary);font-weight:500;border-bottom:1px solid var(--border)">Rainfall</th>
            <th style="padding:6px 12px;color:var(--text-secondary);font-weight:500;border-bottom:1px solid var(--border)">Water Level</th>
            <th style="padding:6px 12px;color:var(--text-secondary);font-weight:500;border-bottom:1px solid var(--border)">Humidity</th>
            <th style="padding:6px 12px;color:var(--text-secondary);font-weight:500;border-bottom:1px solid var(--border)">Rate of Rise</th>
          </tr>
        </thead>
        <tbody id="risk-table-body">
          <!-- Rows injected by JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="app.js"></script>
<script>
let selectedAnalyticsNode = "N1";
let chartRainfall = null;
let chartWater    = null;
let chartRisk     = null;

// Per-node synthetic sensor history (simulates rolling readings)
const sensorHistory = {};
NODES.forEach(n => { sensorHistory[n] = []; });
const MAX_SENSOR_HIST = 20;

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { grid: { color: "rgba(255,255,255,0.05)" }, ticks: { color: "#8a9ab5", font: { size: 10 } } },
    y: { grid: { color: "rgba(255,255,255,0.05)" }, ticks: { color: "#8a9ab5", font: { size: 10 } } },
  },
};

// ── Node selector buttons ──────────────────────────────────────────────
function buildNodeSelector() {
  const wrap = document.getElementById("node-selector");
  NODES.forEach(n => {
    const btn = document.createElement("button");
    btn.textContent = n;
    btn.style.cssText = `
      padding:4px 10px;font-size:11px;cursor:pointer;border-radius:4px;
      border:1px solid var(--border);background:transparent;color:var(--text-secondary);
      transition:all .15s;
    `;
    btn.id = `sel-${n}`;
    btn.addEventListener("click", () => { selectedAnalyticsNode = n; refreshNodeSelector(); refreshTrendCharts(); });
    wrap.appendChild(btn);
  });
  refreshNodeSelector();
}

function refreshNodeSelector() {
  NODES.forEach(n => {
    const btn = document.getElementById(`sel-${n}`);
    if (!btn) return;
    if (n === selectedAnalyticsNode) {
      btn.style.background = "var(--accent-dim)";
      btn.style.color      = "var(--accent)";
      btn.style.borderColor= "rgba(56,189,248,0.3)";
    } else {
      btn.style.background = "transparent";
      btn.style.color      = "var(--text-secondary)";
      btn.style.borderColor= "var(--border)";
    }
  });
}

// ── Initialise charts ──────────────────────────────────────────────────
function initCharts() {
  const labels = [];

  chartRainfall = new Chart(document.getElementById("chart-rainfall"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Rainfall (mm/h)",
        data: [],
        borderColor: "#38bdf8",
        backgroundColor: "rgba(56,189,248,0.1)",
        fill: true,
        tension: 0.4,
        pointRadius: 2,
        borderWidth: 2,
      }],
    },
    options: { ...CHART_DEFAULTS },
  });

  chartWater = new Chart(document.getElementById("chart-water"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Water Level (m)",
        data: [],
        borderColor: "#3b82f6",
        backgroundColor: "rgba(59,130,246,0.1)",
        fill: true,
        tension: 0.4,
        pointRadius: 2,
        borderWidth: 2,
      }],
    },
    options: { ...CHART_DEFAULTS },
  });

  chartRisk = new Chart(document.getElementById("chart-risk"), {
    type: "bar",
    data: {
      labels: [],
      datasets: [
        { label: "Safe",    data: [], backgroundColor: "rgba(34,197,94,0.7)",  stack: "s" },
        { label: "Warning", data: [], backgroundColor: "rgba(234,179,8,0.7)", stack: "s" },
        { label: "Flood",   data: [], backgroundColor: "rgba(239,68,68,0.7)", stack: "s" },
      ],
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: {
        legend: {
          display: true,
          labels: { color: "#8a9ab5", boxWidth: 12, font: { size: 11 } },
        },
      },
      scales: {
        ...CHART_DEFAULTS.scales,
        x: { ...CHART_DEFAULTS.scales.x, stacked: true },
        y: { ...CHART_DEFAULTS.scales.y, stacked: true, max: 15 },
      },
    },
  });
}

// ── Refresh trend charts for selected node ─────────────────────────────
function refreshTrendCharts() {
  const hist = sensorHistory[selectedAnalyticsNode] || [];
  const labels  = hist.map((_, i) => `T-${hist.length - 1 - i}`).reverse();
  const rain    = hist.map(h => h.rainfall);
  const water   = hist.map(h => h.water_level);

  chartRainfall.data.labels  = labels;
  chartRainfall.data.datasets[0].data = rain;
  chartRainfall.update("none");

  chartWater.data.labels  = labels;
  chartWater.data.datasets[0].data = water;
  chartWater.update("none");
}

// ── Update risk distribution chart ────────────────────────────────────
function updateRiskChart() {
  const hist = state.history;
  const labels = hist.map((_, i) => `T${i + 1}`);
  const safe    = hist.map(h => Object.values(h.preds).filter(v => v === "GREEN").length);
  const warning = hist.map(h => Object.values(h.preds).filter(v => v === "YELLOW").length);
  const flood   = hist.map(h => Object.values(h.preds).filter(v => v === "RED").length);

  chartRisk.data.labels           = labels;
  chartRisk.data.datasets[0].data = safe;
  chartRisk.data.datasets[1].data = warning;
  chartRisk.data.datasets[2].data = flood;
  chartRisk.update("none");
}

// ── Update risk table ──────────────────────────────────────────────────
function updateRiskTable(preds) {
  const tbody = document.getElementById("risk-table-body");
  const rows = NODES.map(node => {
    const color = preds[node] || "UNKNOWN";
    const snap  = generateMockSnapshot()[node];
    const rowBg = color === "RED" ? "rgba(239,68,68,0.05)" : color === "YELLOW" ? "rgba(234,179,8,0.05)" : "";
    return `<tr style="background:${rowBg};border-bottom:1px solid var(--border)">
      <td style="padding:8px 12px;font-weight:600;color:var(--text-primary)">${node}</td>
      <td style="padding:8px 12px;text-align:center">${badgeHtml(color)}</td>
      <td style="padding:8px 12px;text-align:center;font-family:monospace;color:var(--text-secondary)">${snap.rainfall.toFixed(1)}</td>
      <td style="padding:8px 12px;text-align:center;font-family:monospace;color:var(--text-secondary)">${snap.water_level.toFixed(2)}</td>
      <td style="padding:8px 12px;text-align:center;font-family:monospace;color:var(--text-secondary)">${(snap.humidity*100).toFixed(0)}%</td>
      <td style="padding:8px 12px;text-align:center;font-family:monospace;color:var(--text-secondary)">${snap.rate_of_rise.toFixed(3)}</td>
    </tr>`;
  }).join("");
  tbody.innerHTML = rows;
}

// ── Main update callback ────────────────────────────────────────────────
function onUpdate(preds) {
  setNavStatus(true);

  // Append sensor history for each node
  const snap = generateMockSnapshot();
  NODES.forEach(n => {
    sensorHistory[n].push(snap[n]);
    if (sensorHistory[n].length > MAX_SENSOR_HIST) sensorHistory[n].shift();
  });

  refreshTrendCharts();
  updateRiskChart();
  updateRiskTable(preds);

  document.getElementById("last-updated").textContent = `Updated: ${formatTime(new Date())}`;
}

// ── Boot ───────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  buildNodeSelector();
  initCharts();
  startPolling(onUpdate);
});
</script>
</body>
</html>
